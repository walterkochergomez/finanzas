<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Debt Tracker AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- Pantalla de Login -->
    <div id="login-screen" class="login-container active">
        <div class="glass-card text-center">
            <div class="logo justify-center mb-2">
                <i class="fa-solid fa-rocket"></i> <span>Gastos AI</span>
            </div>
            <p>Inicia sesión para gestionar tus finanzas</p>
            <button id="btn-login" class="btn-primary mt-2">
                <i class="fa-brands fa-google"></i> Entrar con Google
            </button>
        </div>
    </div>

    <!-- Aplicación Principal (Oculta hasta iniciar sesión) -->
    <div id="app-screen" class="app-container" style="display: none;">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-rocket"></i> <span>Gastos AI</span>
            </div>
            
            <div class="user-info mb-2">
                <img id="user-avatar" src="" alt="Avatar" class="avatar">
                <span id="user-name">Usuario</span>
                <button id="btn-logout" class="btn-icon" title="Cerrar Sesión"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>

            <!-- Selector de Mes -->
            <div class="month-selector mb-2">
                <label>Periodo Actual</label>
                <input type="month" id="mes-actual" class="w-100">
            </div>

            <nav class="menu-nav">
                <button id="btn-registro" class="nav-item active"><i class="fa-solid fa-pen-to-square"></i> Gastos</button>
                <button id="btn-deudas" class="nav-item"><i class="fa-solid fa-hand-holding-dollar"></i> Deudas</button>
                <button id="btn-estadisticas" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Estadísticas</button>
            </nav>
        </aside>

        <main class="main-content">
            <!-- Pestaña 1: Gastos (igual que antes, pero conectada a Firebase) -->
            <section id="tab-registro" class="content-section active">
                <header class="section-header"><h2>Registro de Gastos</h2></header>
                <!-- Formulario de gastos omitido por brevedad, es el mismo de antes -->
            </section>

            <!-- Pestaña 2: Nueva Sección de DEUDAS -->
            <section id="tab-deudas" class="content-section">
                <header class="section-header">
                    <h2>Control de Deudas</h2>
                    <p>Las deudas no pagadas se sumarán al mes siguiente automáticamente.</p>
                </header>

                <form id="form-deuda" class="glass-card">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Descripción de la Deuda</label>
                            <input type="text" id="desc-deuda" placeholder="Ej: Tarjeta de Crédito" required>
                        </div>
                        <div class="form-group">
                            <label>Total Adeudado ($)</label>
                            <input type="number" id="monto-deuda" placeholder="0" required>
                        </div>
                        <div class="form-group">
                            <label>Monto Pagado ($)</label>
                            <input type="number" id="pagado-deuda" placeholder="0" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Registrar Deuda</button>
                </form>

                <div class="history-section">
                    <h3>Estado de Deudas (<span id="mes-deudas-label"></span>)</h3>
                    <div id="lista-deudas" class="history-grid"></div>
                </div>
            </section>

            <!-- Pestaña 3: Estadísticas -->
            <section id="tab-estadisticas" class="content-section">
                <!-- Igual que antes -->
            </section>
        </main>
    </div>

    <!-- Archivo JS como módulo para usar Firebase -->
    <script type="module" src="app.js"></script>
</body>
</html>
